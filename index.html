<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Break Time Monitoring System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 8px;
      --radius-lg: 12px;
      --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); min-height: 100vh; margin: 0; padding: 0; color: var(--gray-700); }
    .company-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 16px 32px; box-shadow: var(--shadow-md); }
    .company-header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .brand h1 { margin: 0; font-size: 1.4rem; font-weight: 600; }
    .brand-subtitle { font-size: 0.75rem; opacity: 0.85; }
    
    .main-container { max-width: 1400px; margin: 0 auto; padding: 20px 32px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; background: white; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--gray-500); box-shadow: var(--shadow); }
    .tab:hover { background: var(--gray-100); }
    .tab.active { background: var(--primary); color: white; }
    
    /* Dashboard Cards */
    .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow); }
    .stat-card h3 { margin: 0 0 8px; font-size: 0.8rem; color: var(--gray-500); text-transform: uppercase; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--gray-900); }
    .stat-card.working .value { color: var(--success); }
    .stat-card.on-break .value { color: var(--warning); }
    .stat-card.late .value { color: var(--danger); }
    
    /* Employee Grid */
    .employee-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .emp-card { background: white; padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow); border-left: 4px solid var(--success); }
    .emp-card.on-break { border-left-color: var(--warning); }
    .emp-card.late { border-left-color: var(--danger); }
    .emp-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .emp-avatar { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; }
    .emp-card.on-break .emp-avatar { background: var(--warning); }
    .emp-card.late .emp-avatar { background: var(--danger); }
    .emp-name { font-weight: 600; font-size: 1.1rem; }
    .emp-status { font-size: 0.8rem; padding: 4px 10px; border-radius: 999px; }
    .emp-status.working { background: #dcfce7; color: #166534; }
    .emp-status.on-break { background: #fef3c7; color: #92400e; }
    .emp-status.late { background: #fee2e2; color: #991b1b; }
    .emp-details { font-size: 0.85rem; color: var(--gray-500); margin-top: 8px; }
    
    /* Topbar */
    .topbar { background: white; padding: 14px 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow); display: flex; gap: 16px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    input[type="date"], input[type="text"], input[type="password"], select { padding: 8px 12px; border: 1px solid var(--gray-300); border-radius: var(--radius); font-size: 0.85rem; font-family: inherit; }
    button { padding: 8px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.85rem; font-weight: 500; font-family: inherit; }
    button:hover { opacity: 0.9; }
    #todayBtn { background: var(--primary); color: white; }
    #exportBtn { background: var(--success); color: white; }
    .right-tools { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    
    /* User Section */
    .user-section { background: white; padding: 24px; border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: 20px; }
    .user-section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .controls button { flex: 1; min-width: 120px; padding: 10px; }
    .btn-start { background: var(--primary); color: white; }
    .btn-end { background: var(--success); color: white; }
    .log-container { background: var(--gray-50); border-radius: var(--radius); padding: 14px; max-height: 180px; overflow-y: auto; }
    .log-entry { padding: 6px 10px; margin-bottom: 4px; background: white; border-radius: 4px; border-left: 3px solid var(--primary); font-size: 0.8rem; }
    .log-entry.exceeded { border-left-color: var(--danger); background: #fef2f2; }
    .log-entry.success { border-left-color: var(--success); }
    .pill { display: inline-block; padding: 3px 8px; font-size: 0.7rem; font-weight: 500; border-radius: 999px; margin-left: 6px; background: #dbeafe; color: var(--primary); }
    .badge { padding: 5px 12px; font-size: 0.75rem; font-weight: 500; border-radius: 999px; }
    .badge-admin { background: #dcfce7; color: #166534; }
    .badge-emp { background: #dbeafe; color: #1e40af; }
    .section-title { font-size: 0.8rem; font-weight: 600; color: var(--gray-500); text-transform: uppercase; margin-bottom: 10px; }
    
    /* Overlay */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: white; padding: 28px; border-radius: var(--radius-lg); width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .modal-header { text-align: center; margin-bottom: 20px; }
    .modal-header h2 { margin: 0 0 4px; font-size: 1.3rem; }
    .field { margin: 12px 0; }
    .field label { display: block; font-weight: 500; font-size: 0.85rem; margin-bottom: 4px; }
    .field input, .field select { width: 100%; }
    .modal .actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal .actions button { flex: 1; padding: 10px; }
    #loginBtn { background: var(--primary); color: white; }
    #loginCancelBtn { background: var(--gray-100); }
    .hide { display: none; }
    
    /* Reports */
    .report-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
    .report-table th, .report-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--gray-200); }
    .report-table th { background: var(--gray-100); font-size: 0.8rem; text-transform: uppercase; color: var(--gray-500); }
    .report-table td { font-size: 0.9rem; }
    .report-table tr:hover { background: var(--gray-50); }
    
    /* Employee Management */
    .emp-list { max-height: 300px; overflow-y: auto; }
    .emp-list-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--gray-200); }
    .emp-list-item:last-child { border-bottom: none; }
    .emp-list-item button { padding: 4px 10px; font-size: 0.75rem; }
    .btn-delete { background: var(--danger); color: white; }
    .btn-add { background: var(--success); color: white; }
    
    .sync-status { font-size: 0.75rem; color: var(--gray-500); }
    .sync-status.synced { color: var(--success); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

<div class="company-header">
  <div class="company-header-inner">
    <div class="brand">
      <h1>Break Time Monitoring</h1>
      <div class="brand-subtitle">Employee Break Tracking System</div>
    </div>
    <div class="sync-status" id="syncStatus">● Syncing...</div>
  </div>
</div>

<div class="main-container">
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="tab" onclick="showTab('breaks')">Break Logs</button>
    <button class="tab" onclick="showTab('reports')">Reports</button>
    <button class="tab" onclick="showTab('employees')" id="adminEmployeesTab" style="display:none;">Employees</button>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="dashboard" class="tab-content active">
    <div class="dashboard-stats">
      <div class="stat-card working">
        <h3>Working</h3>
        <div class="value" id="statWorking">0</div>
      </div>
      <div class="stat-card on-break">
        <h3>On Break</h3>
        <div class="value" id="statOnBreak">0</div>
      </div>
      <div class="stat-card late">
        <h3>Over Limit</h3>
        <div class="value" id="statLate">0</div>
      </div>
      <div class="stat-card">
        <h3>Total Breaks Today</h3>
        <div class="value" id="statTotalBreaks">0</div>
      </div>
    </div>
    <div class="employee-grid" id="employeeGrid"></div>
  </div>

  <!-- BREAKS TAB -->
  <div id="breaks" class="tab-content">
    <div class="topbar">
      <label>Date:</label>
      <input type="date" id="datePicker" />
      <button id="todayBtn">Today</button>
      <button id="exportBtn">Export CSV</button>
      <button id="clearAllBtn" style="display:none;background:#dc2626;color:white;">Clear All Logs</button>
      <div class="right-tools">
        <span id="whoAmI" class="badge"></span>
        <button id="switchAccountBtn">Switch Account</button>
      </div>
    </div>
    <div id="users"></div>
  </div>

  <!-- REPORTS TAB -->
  <div id="reports" class="tab-content">
    <div class="topbar">
      <label>From:</label>
      <input type="date" id="reportFrom" />
      <label>To:</label>
      <input type="date" id="reportTo" />
      <button onclick="loadReport()" style="background:var(--primary);color:white;">Load Report</button>
      <button onclick="exportReport()" style="background:var(--success);color:white;">Export Report</button>
    </div>
    <table class="report-table">
      <thead>
        <tr>
          <th>Employee</th>
          <th>First Break</th>
          <th>Lunch</th>
          <th>Last Break</th>
          <th>Total Time</th>
          <th>Exceeded</th>
        </tr>
      </thead>
      <tbody id="reportBody"></tbody>
    </table>
  </div>

  <!-- EMPLOYEES TAB (Admin Only) -->
  <div id="employees" class="tab-content">
    <div class="user-section">
      <h3>Add New Employee</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <input type="text" id="newEmpName" placeholder="Employee Name" style="flex:1;min-width:200px;" />
        <input type="text" id="newEmpPin" placeholder="PIN" style="width:100px;" />
        <button onclick="addEmployee()" class="btn-add">Add Employee</button>
      </div>
    </div>
    <div class="user-section">
      <h3>Employee List</h3>
      <div class="emp-list" id="empList"></div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div id="loginOverlay" class="overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Welcome Back</h2>
      <p>Sign in to access the system</p>
    </div>
    <div class="field">
      <label>Role</label>
      <div style="display:flex;gap:16px;">
        <label><input type="radio" name="role" value="employee" checked /> Employee</label>
        <label><input type="radio" name="role" value="admin" /> Admin</label>
      </div>
    </div>
    <div id="empFields">
      <div class="field">
        <label>Employee Name</label>
        <input id="empName" type="text" placeholder="Your name" />
      </div>
      <div class="field">
        <label>PIN</label>
        <input id="empPin" type="password" placeholder="Your PIN" />
      </div>
    </div>
    <div id="adminFields" class="hide">
      <div class="field">
        <label>Admin PIN</label>
        <input id="adminPin" type="password" placeholder="Admin PIN" />
      </div>
    </div>
    <div class="actions">
      <button id="loginCancelBtn">Cancel</button>
      <button id="loginBtn">Login</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// ===== CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyB6HMUB9tjhfhjVmdFe3KrUc6YqtKM-xq4",
  authDomain: "breaktime-monitoring-system.firebaseapp.com",
  databaseURL: "https://breaktime-monitoring-system-default-rtdb.firebaseio.com",
  projectId: "breaktime-monitoring-system",
  storageBucket: "breaktime-monitoring-system.firebasestorage.app",
  messagingSenderId: "13352620027",
  appId: "1:13352620027:web:c0b9261fff5ec695ba055e"
};

// ===== STATE =====
let database;
let selectedDate = new Date().toISOString().split('T')[0];
let breakData = {};
let logEntries = {};
let employees = {};
let currentTab = 'dashboard';
let isUpdating = false;

// ===== FIREBASE =====

function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    
    database.ref('.info/connected').on('value', snap => {
      document.getElementById('syncStatus').innerHTML = snap.val() ? '● Synced' : '● Connecting...';
      document.getElementById('syncStatus').className = snap.val() ? 'sync-status synced' : 'sync-status';
    });
    
    database.ref('breakData').on('value', snap => {
      const data = snap.val() || {};
      breakData = data[selectedDate] || {};
      ensureStructures();
      if (!isUpdating && currentTab === 'dashboard') renderDashboard();
      if (!isUpdating && currentTab === 'breaks') renderUserSection();
    });
    
    database.ref('logs').on('value', snap => {
      const data = snap.val() || {};
      logEntries = data[selectedDate] || {};
      ensureStructures();
      if (!isUpdating && currentTab === 'breaks') renderUserSection();
    });
    
    database.ref('employees').on('value', snap => {
      employees = snap.val() || getDefaultEmployees();
      ensureStructures();
      renderEmployeeList();
      if (isAdmin()) document.getElementById('adminEmployeesTab').style.display = 'inline-block';
    });
    
  } catch(e) { console.error(e); }
}

function getDefaultEmployees() {
  return {
    "Prince Jeremie Malana": "0000",
    "MATT": "0000",
    "XERXIS": "0000",
    "CENT": "0000",
    "MAK": "0000",
    "WINSLET": "0000",
    "GLADYS": "0000",
    "JESSICARTS": "0000",
    "MLORIDA": "0000"
  };
}

function saveToFirebase() {
  if (!database) return;
  isUpdating = true;
  database.ref('breakData/' + selectedDate).set(breakData);
  database.ref('logs/' + selectedDate).set(logEntries);
  database.ref('employees').set(employees);
  // Refresh UI after save
  if (currentTab === 'dashboard') renderDashboard();
  if (currentTab === 'breaks') renderUserSection();
  setTimeout(() => { isUpdating = false; }, 500);
}

const ADMIN_PIN = "2468";
const breakLimits = { firstBreak: 15, lunch: 60, lastBreak: 15 };

// ===== HELPERS =====
function sanitizeId(str) { return str.replace(/[^a-z0-9]+/gi, '-').toLowerCase(); }
function formatType(t) { return t === 'firstBreak' ? 'First Break' : t === 'lunch' ? 'Lunch' : 'Last Break'; }
function fmtNow() { return new Date().toLocaleTimeString(); }
function minsDiff(a, b) { return Math.round((b - a) / 60000); }

function isAdmin() { return sessionStorage.getItem('btm_role') === 'admin'; }
function currentUser() { return sessionStorage.getItem('btm_user'); }

function setSession(role, user) {
  if (role === 'admin') { sessionStorage.setItem('btm_role', 'admin'); sessionStorage.removeItem('btm_user'); }
  else if (role === 'employee' && user) { sessionStorage.setItem('btm_role', 'employee'); sessionStorage.setItem('btm_user', user); }
  else { sessionStorage.removeItem('btm_role'); sessionStorage.removeItem('btm_user'); }
  syncAuthUI();
  if (isAdmin()) document.getElementById('adminEmployeesTab').style.display = 'inline-block';
}

function getEmployeeNames() { return Object.keys(employees); }
function getVisibleUsers() { return isAdmin() ? getEmployeeNames() : (currentUser() ? [currentUser()] : []); }

// ===== DATA =====
function ensureStructures() {
  getEmployeeNames().forEach(u => {
    if (!breakData[u]) breakData[u] = { firstBreak: {start:null,end:null}, lunch: {start:null,end:null}, lastBreak: {start:null,end:null}, activeBreak: null };
    if (!logEntries[u]) logEntries[u] = [];
  });
}

// ===== TABS =====
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.add('active');
  
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'breaks') renderUserSection();
  else if (tab === 'reports') initReports();
  else if (tab === 'employees') renderEmployeeList();
}

// ===== DASHBOARD =====
function renderDashboard() {
  const grid = document.getElementById('employeeGrid');
  grid.innerHTML = '';
  
  let working = 0, onBreak = 0, late = 0, totalBreaks = 0;
  const names = getEmployeeNames();
  
  names.forEach(name => {
    const state = breakData[name] || {};
    const active = state.activeBreak;
    let status = 'Working', statusClass = 'working', duration = '';
    
    if (active) {
      onBreak++;
      status = 'On Break';
      statusClass = 'on-break';
      const start = state[active]?.start;
      if (start) {
        const mins = minsDiff(new Date(start), new Date());
        const limit = breakLimits[active];
        if (mins > limit) {
          status = 'Over Limit!';
          statusClass = 'late';
          late++;
        }
        duration = ` - ${mins}m`;
      }
    } else {
      working++;
    }
    
    // Count completed breaks
    ['firstBreak', 'lunch', 'lastBreak'].forEach(t => {
      if (state[t]?.start && state[t]?.end) totalBreaks++;
    });
    
    const initials = name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
    
    grid.innerHTML += `
      <div class="emp-card ${statusClass}">
        <div class="emp-card-header">
          <div class="emp-avatar">${initials}</div>
          <div>
            <div class="emp-name">${name}</div>
            <span class="emp-status ${statusClass}">${status}${duration}</span>
          </div>
        </div>
        <div class="emp-details">
          ${active ? `${formatType(active)} started at ${new Date(state[active].start).toLocaleTimeString()}` : 'Currently working'}
        </div>
      </div>
    `;
  });
  
  document.getElementById('statWorking').textContent = working;
  document.getElementById('statOnBreak').textContent = onBreak;
  document.getElementById('statLate').textContent = late;
  document.getElementById('statTotalBreaks').textContent = totalBreaks;
}

// ===== BREAKS TAB =====
function renderUserSection() {
  const container = document.getElementById('users');
  container.innerHTML = '';
  const visible = getVisibleUsers();
  const isEmp = !isAdmin();
  
  visible.forEach(user => {
    const state = breakData[user] || {};
    const active = state.activeBreak;
    const initials = user.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
    const activePill = active ? `<span class="pill">Active: ${formatType(active)}</span>` : '';
    
    // Show controls only for employees (not admin)
    const controlsHtml = isEmp ? `
      <div class="section-title">Break Controls</div>
      <div class="controls">
        <button class="btn-start" onclick="startBreak('${user}', 'firstBreak')">Start First (15m)</button>
        <button class="btn-end" onclick="endBreak('${user}', 'firstBreak')" ${!active || active !== 'firstBreak' ? 'disabled' : ''}>Back</button>
        <button class="btn-start" onclick="startBreak('${user}', 'lunch')">Start Lunch (60m)</button>
        <button class="btn-end" onclick="endBreak('${user}', 'lunch')" ${!active || active !== 'lunch' ? 'disabled' : ''}>Back</button>
        <button class="btn-start" onclick="startBreak('${user}', 'lastBreak')">Start Last (15m)</button>
        <button class="btn-end" onclick="endBreak('${user}', 'lastBreak')" ${!active || active !== 'lastBreak' ? 'disabled' : ''}>Back</button>
      </div>
    ` : '';
    
    container.innerHTML += `
      <div class="user-section">
        <div class="user-section-header">
          <div class="emp-avatar" style="width:36px;height:36px;font-size:0.85rem;">${initials}</div>
          <h3>${user}${activePill}</h3>
        </div>
        ${controlsHtml}
        <div class="section-title">Break Log - ${selectedDate}</div>
        <div id="log-${sanitizeId(user)}" class="log-container"></div>
      </div>
    `;
    renderUserLog(user);
  });
  
  if (visible.length === 0) {
    container.innerHTML = '<div class="user-section" style="text-align:center;color:var(--gray-500);">Please sign in to view logs.</div>';
  }
}

function renderUserLog(user) {
  const box = document.getElementById('log-' + sanitizeId(user));
  if (!box) return;
  box.innerHTML = (logEntries[user] || []).map(msg => {
    const isExceeded = msg.includes('Exceeded');
    const isSuccess = msg.includes('started at') || msg.includes('ended at');
    return `<div class="log-entry ${isExceeded ? 'exceeded' : ''} ${isSuccess ? 'success' : ''}">${msg}</div>`;
  }).join('');
}

// ===== ACTIONS =====

window.startBreak = function(user, type) {
  if (isUpdating) return;
  if (isAdmin()) { alert('Admin cannot start/end employee breaks.'); return; }
  if (user !== currentUser()) { alert('You can only log your own breaks.'); return; }
  const state = breakData[user] || {};
  if (state.activeBreak) { alert('You already have an active break. End it first.'); return; }
  
  state[type] = { start: new Date().toISOString(), end: null };
  state.activeBreak = type;
  breakData[user] = state;
  
  addLog(user, `<strong>${formatType(type)}</strong> started at: ${fmtNow()}`);
  saveToFirebase();
};

window.endBreak = function(user, type) {
  if (isUpdating) return;
  if (isAdmin()) { alert('Admin cannot start/end employee breaks.'); return; }
  if (user !== currentUser()) { alert('You can only log your own breaks.'); return; }
  const state = breakData[user];
  if (!state || state.activeBreak !== type) { alert('No active break to end.'); return; }
  
  const end = new Date();
  const start = new Date(state[type].start);
  const duration = minsDiff(start, end);
  
  state[type].end = end.toISOString();
  state.activeBreak = null;
  
  let msg = `<strong>${formatType(type)}</strong> ended at: ${fmtNow()} (${duration} mins)`;
  if (duration > breakLimits[type]) msg += ` <span style="color:#dc2626;font-weight:600;">⚠ Exceeded by ${duration - breakLimits[type]} mins</span>`;
  
  addLog(user, msg);
  saveToFirebase();
};

function addLog(user, msg) {
  if (!logEntries[user]) logEntries[user] = [];
  // Check for duplicate
  const lastMsg = logEntries[user][logEntries[user].length - 1];
  if (lastMsg && lastMsg.includes(msg.split(' at: ')[1])) return;
  logEntries[user].push(msg);
}

function deleteUserLog(user) {
  if (!confirm(`Delete all logs for ${user} on ${selectedDate}?`)) return;
  
  // Clear break data and logs for this user
  breakData[user] = { firstBreak: {start:null,end:null}, lunch: {start:null,end:null}, lastBreak: {start:null,end:null}, activeBreak: null };
  logEntries[user] = [];
  saveToFirebase();
}

// ===== REPORTS =====
function initReports() {
  const today = new Date();
  const weekAgo = new Date(today);
  weekAgo.setDate(weekAgo.getDate() - 7);
  document.getElementById('reportFrom').value = weekAgo.toISOString().split('T')[0];
  document.getElementById('reportTo').value = today.toISOString().split('T')[0];
  loadReport();
}

let reportData = [];
function loadReport() {
  const from = document.getElementById('reportFrom').value;
  const to = document.getElementById('reportTo').value;
  const tbody = document.getElementById('reportBody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading...</td></tr>';
  
  database.ref('breakData').once('value', snap => {
    const allData = snap.val() || {};
    reportData = [];
    
    getEmployeeNames().forEach(name => {
      let firstTotal = 0, lunchTotal = 0, lastTotal = 0, exceeded = 0;
      
      for (let d = new Date(from); d <= new Date(to); d.setDate(d.getDate() + 1)) {
        const dateStr = d.toISOString().split('T')[0];
        const dayData = allData[dateStr]?.[name];
        if (!dayData) continue;
        
        ['firstBreak', 'lunch', 'lastBreak'].forEach((type, idx) => {
          if (dayData[type]?.start && dayData[type]?.end) {
            const mins = minsDiff(new Date(dayData[type].start), new Date(dayData[type].end));
            if (idx === 0) firstTotal += mins;
            else if (idx === 1) lunchTotal += mins;
            else lastTotal += mins;
            
            const limit = breakLimits[type];
            if (mins > limit) exceeded += (mins - limit);
          }
        });
      }
      
      reportData.push({ name, firstTotal, lunchTotal, lastTotal, total: firstTotal + lunchTotal + lastTotal, exceeded });
    });
    
    tbody.innerHTML = reportData.map(r => `
      <tr>
        <td>${r.name}</td>
        <td>${r.firstTotal}m</td>
        <td>${r.lunchTotal}m</td>
        <td>${r.lastTotal}m</td>
        <td>${r.total}m</td>
        <td style="color:${r.exceeded > 0 ? '#dc2626' : '#059669'};font-weight:${r.exceeded > 0 ? '600' : '400'};">${r.exceeded > 0 ? r.exceeded + 'm' : '-'}</td>
      </tr>
    `).join('');
  });
}

function exportReport() {
  if (!reportData.length) { alert('No data to export'); return; }
  const rows = [['Employee', 'First Break (m)', 'Lunch (m)', 'Last Break (m)', 'Total (m)', 'Exceeded (m)']];
  reportData.forEach(r => rows.push([r.name, r.firstTotal, r.lunchTotal, r.lastTotal, r.total, r.exceeded]));
  
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `break-report-${document.getElementById('reportFrom').value}-${document.getElementById('reportTo').value}.csv`;
  a.click();
}

// ===== EMPLOYEE MANAGEMENT =====
function renderEmployeeList() {
  const list = document.getElementById('empList');
  list.innerHTML = Object.entries(employees).map(([name, pin]) => `
    <div class="emp-list-item">
      <span>${name} (PIN: ${pin})</span>
      <button class="btn-delete" onclick="removeEmployee('${name}')">Remove</button>
    </div>
  `).join('');
}

function addEmployee() {
  const name = document.getElementById('newEmpName').value.trim();
  const pin = document.getElementById('newEmpPin').value.trim();
  if (!name || !pin) { alert('Please enter name and PIN'); return; }
  if (employees[name]) { alert('Employee already exists'); return; }
  
  employees[name] = pin;
  saveToFirebase();
  document.getElementById('newEmpName').value = '';
  document.getElementById('newEmpPin').value = '';
  renderEmployeeList();
  alert('Employee added successfully!');
}

function removeEmployee(name) {
  if (!confirm(`Remove ${name}?`)) return;
  delete employees[name];
  saveToFirebase();
  renderEmployeeList();
}

// ===== AUTH =====
function showLogin() {
  document.querySelector('input[name="role"][value="employee"]').checked = true;
  document.getElementById('empFields').classList.remove('hide');
  document.getElementById('adminFields').classList.add('hide');
  document.getElementById('loginOverlay').style.display = 'flex';
}
function hideLogin() { document.getElementById('loginOverlay').style.display = 'none'; }
function syncAuthUI() {
  document.getElementById('whoAmI').textContent = isAdmin() ? 'Admin' : (currentUser() || '');
  document.getElementById('whoAmI').className = 'badge ' + (isAdmin() ? 'badge-admin' : 'badge-emp');
  document.getElementById('clearAllBtn').style.display = isAdmin() ? 'inline-block' : 'none';
}

document.querySelectorAll('input[name="role"]').forEach(r => {
  r.addEventListener('change', e => {
    document.getElementById('empFields').classList.toggle('hide', e.target.value !== 'employee');
    document.getElementById('adminFields').classList.toggle('hide', e.target.value !== 'admin');
  });
});

document.getElementById('loginBtn').onclick = () => {
  const role = document.querySelector('input[name="role"]:checked').value;
  if (role === 'employee') {
    const name = document.getElementById('empName').value.trim();
    const pin = document.getElementById('empPin').value;
    if (employees[name] !== pin) { alert('Invalid credentials'); return; }
    setSession('employee', name);
  } else {
    if (document.getElementById('adminPin').value !== ADMIN_PIN) { alert('Invalid Admin PIN'); return; }
    setSession('admin');
  }
  hideLogin();
  showTab('dashboard');
};

document.getElementById('loginCancelBtn').onclick = () => {
  if (!sessionStorage.getItem('btm_role')) { alert('You must sign in'); return; }
  hideLogin();
};

document.getElementById('switchAccountBtn').onclick = () => {
  setSession(null);
  showTab('dashboard');
  showLogin();
};

// ===== AUTO LOGOUT (8 hours) =====
setInterval(() => {
  const lastActive = sessionStorage.getItem('btm_lastActive');
  if (lastActive && Date.now() - parseInt(lastActive) > 8 * 60 * 60 * 1000) {
    setSession(null);
    showLogin();
  }
  sessionStorage.setItem('btm_lastActive', Date.now());
}, 60000);

// ===== INIT =====
document.getElementById('datePicker').value = selectedDate;
document.getElementById('datePicker').onchange = e => { 
  selectedDate = e.target.value; 
  database.ref('breakData/' + selectedDate).once('value').then(snap => {
    breakData = snap.val() || {};
    database.ref('logs/' + selectedDate).once('value').then(s => {
      logEntries = s.val() || {};
      ensureStructures();
      renderUserSection();
    });
  });
};
document.getElementById('todayBtn').onclick = () => { 
  selectedDate = new Date().toISOString().split('T')[0]; 
  document.getElementById('datePicker').value = selectedDate;
  database.ref('breakData/' + selectedDate).once('value').then(snap => {
    breakData = snap.val() || {};
    database.ref('logs/' + selectedDate).once('value').then(s => {
      logEntries = s.val() || {};
      ensureStructures();
      renderUserSection();
      renderDashboard();
    });
  });
};
document.getElementById('exportBtn').onclick = () => {
  const rows = [['Date','User','Break Type','Start','End','Duration (min)','Exceeded']];
  getVisibleUsers().forEach(u => {
    ['firstBreak','lunch','lastBreak'].forEach(t => {
      const rec = breakData[u]?.[t];
      if (rec?.start || rec?.end) {
        const dur = rec.start && rec.end ? minsDiff(new Date(rec.start), new Date(rec.end)) : '';
        const exc = dur > breakLimits[t] ? dur - breakLimits[t] : '';
        rows.push([selectedDate, u, formatType(t), rec.start ? new Date(rec.start).toLocaleTimeString() : '', rec.end ? new Date(rec.end).toLocaleTimeString() : '', dur, exc]);
      }
    });
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `breaks-${selectedDate}.csv`;
  a.click();
};

document.getElementById('clearAllBtn').onclick = () => {
  if (!confirm(`Clear all logs for ${selectedDate}? This cannot be undone.`)) return;
  getEmployeeNames().forEach(name => {
    breakData[name] = { firstBreak: {start:null,end:null}, lunch: {start:null,end:null}, lastBreak: {start:null,end:null}, activeBreak: null };
    logEntries[name] = [];
  });
  saveToFirebase();
};

initFirebase();
ensureStructures();

if (sessionStorage.getItem('btm_role')) {
  syncAuthUI();
  if (isAdmin()) document.getElementById('adminEmployeesTab').style.display = 'inline-block';
} else {
  showLogin();
}
</script>
